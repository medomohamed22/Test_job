<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محرك بحث الوظائف | شغلني</title>
    <!-- Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f8fafc;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: left 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-left: 2.5rem;
            appearance: none;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- قسم الهيدر والنبذة التعريفية -->
    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white shadow-xl pb-24 pt-16 rounded-b-[3rem] relative">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl sm:text-5xl font-extrabold mb-4 leading-tight">انطلق نحو وظيفة أحلامك 🚀</h1>
            <p class="max-w-2xl mx-auto text-blue-100 text-lg sm:text-xl leading-relaxed mb-8">
                منصتك الذكية للبحث عن الوظائف. نجمع لك آلاف الفرص من مختلف الشركات حول العالم في مكان واحد. 
                سواء كنت تبحث عن عمل من المنزل أو في مقر الشركة، خياراتنا تناسب طموحك.
            </p>
        </div>
    </header>

    <!-- لوحة البحث والفلاتر -->
    <section class="container mx-auto px-4 -mt-16 relative z-10">
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                
                <!-- مربع البحث -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">المسمى الوظيفي</label>
                    <input type="text" id="searchInput" placeholder="مثال: Frontend Developer, محاسب..." 
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                        onkeypress="handleKeyPress(event)">
                </div>

                <!-- فلتر الدولة -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">موقع العمل (البلد)</label>
                    <select id="locationFilter" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="">كل الدول (عالمي)</option>
                        <option value="Egypt">مصر</option>
                        <option value="Saudi Arabia">السعودية</option>
                        <option value="United Arab Emirates">الإمارات</option>
                        <option value="Qatar">قطر</option>
                        <option value="Kuwait">الكويت</option>
                        <option value="United States">الولايات المتحدة</option>
                        <option value="United Kingdom">المملكة المتحدة</option>
                    </select>
                </div>

                <!-- فلتر نوع العمل -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">نوع العمل</label>
                    <select id="workTypeFilter" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="">الكل (عن بعد / حضوري)</option>
                        <option value="remote">عمل عن بعد (Remote)</option>
                        <option value="onsite">في مقر الشركة (On-site)</option>
                    </select>
                </div>

                <!-- زر البحث -->
                <div class="md:col-span-4 mt-2">
                    <button onclick="searchJobs()" 
                        class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold text-lg py-3 rounded-lg shadow-md transition duration-300 transform hover:-translate-y-0.5">
                        ابحث الآن 🔍
                    </button>
                </div>
                
            </div>
        </div>
    </section>

    <!-- قسم عرض النتائج -->
    <main class="container mx-auto px-4 py-12">
        <!-- مؤشر التحميل -->
        <div id="loading" class="text-center text-lg text-blue-600 font-bold hidden my-10 flex flex-col items-center justify-center">
            <svg class="animate-spin h-12 w-12 mb-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>جاري البحث في آلاف الوظائف...</span>
        </div>
        
        <!-- شبكة الوظائف -->
        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- الجافاسكربت الخاص بالواجهة -->
    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchJobs();
            }
        }

        async function searchJobs() {
            const searchInput = document.getElementById('searchInput').value;
            const locationFilter = document.getElementById('locationFilter').value;
            const workTypeFilter = document.getElementById('workTypeFilter').value;
            
            let query = searchInput.trim() !== '' ? searchInput : 'Developer';

            if (workTypeFilter === 'remote') {
                query += ' remote';
            } else if (workTypeFilter === 'onsite') {
                query += ' onsite';
            }

            const resultsContainer = document.getElementById('results');
            const loadingIndicator = document.getElementById('loading');

            resultsContainer.innerHTML = '';
            loadingIndicator.classList.remove('hidden');

            try {
                // الاتصال بالخادم الخاص بنا
                let apiUrl = `http://localhost:3000/api/jobs?q=${encodeURIComponent(query)}`;
                if (locationFilter !== '') {
                    apiUrl += `&location=${encodeURIComponent(locationFilter)}`;
                }

                const response = await fetch(apiUrl);
                const data = await response.json();
                
                loadingIndicator.classList.add('hidden');

                // فحص الأخطاء المرسلة من السيرفر (مثل نفاذ الباقة)
                if (!response.ok || data.error) {
                    const errorMsg = data.error || 'حدث خطأ غير معروف';
                    resultsContainer.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-red-100 shadow-sm">
                        <span class="text-4xl mb-4 block">⚠️</span>
                        <p class="text-red-600 font-bold text-xl mb-2">رسالة من الخادم: ${errorMsg}</p>
                        <p class="text-gray-500">إذا كانت الرسالة تتعلق بـ Quota فهذا يعني أن رصيد بحثك المجاني قد انتهى.</p>
                    </div>`;
                    return;
                }

                const jobs = data.jobs || [];

                if (jobs.length > 0) {
                    jobs.forEach(job => {
                        const scheduleType = job.detected_extensions?.schedule_type || 'غير محدد';
                        const salary = job.detected_extensions?.salary || 'الراتب غير معلن';
                        const postedAt = job.detected_extensions?.posted_at || 'مؤخراً';

                        const jobCard = `
                            <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col overflow-hidden border border-gray-100 transform hover:-translate-y-1">
                                <div class="p-6 flex-grow">
                                    <h2 class="text-xl font-bold text-gray-900 mb-2" dir="ltr">${job.title}</h2>
                                    <div class="text-indigo-600 font-bold mb-2" dir="ltr">🏢 ${job.company_name}</div>
                                    <div class="text-gray-500 text-sm mb-4 flex items-center flex-wrap gap-2" dir="ltr">
                                        <span>📍 ${job.location}</span> 
                                        <span class="text-gray-300">•</span> 
                                        <span>⏱️ ${postedAt}</span>
                                    </div>
                                    
                                    <div class="flex flex-wrap gap-2 mb-4" dir="ltr">
                                        <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-indigo-100">
                                            ⏳ ${scheduleType}
                                        </span>
                                        <span class="bg-green-50 text-green-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-green-100">
                                            💵 ${salary}
                                        </span>
                                    </div>
                                    
                                    <p class="text-gray-600 text-sm line-clamp-3 leading-relaxed" dir="ltr">
                                        ${job.description}
                                    </p>
                                </div>
                                <div class="p-4 bg-gray-50 border-t border-gray-100">
                                    <a href="${job.share_link}" target="_blank" 
                                        class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-200">
                                        التقديم للوظيفة
                                    </a>
                                </div>
                            </div>
                        `;
                        resultsContainer.innerHTML += jobCard;
                    });
                } else {
                    resultsContainer.innerHTML = '<div class="col-span-full text-center text-gray-600 text-xl py-12 bg-white rounded-2xl border border-gray-100">لم يتم العثور على وظائف مطابقة للبحث. جرب تغيير الدولة أو المسمى الوظيفي.</div>';
                }
            } catch (error) {
                console.error("Error:", error);
                loadingIndicator.classList.add('hidden');
                resultsContainer.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-red-100 shadow-sm">
                        <span class="text-4xl mb-4 block">🔌</span>
                        <p class="text-red-600 font-bold text-xl mb-2">لا يمكن الاتصال بالخادم!</p>
                        <p class="text-gray-500">تأكد من تشغيل ملف <b>server.js</b> في موجه الأوامر (Terminal) باستخدام الأمر: <code>node server.js</code></p>
                    </div>`;
            }
        }

        // تشغيل بحث افتراضي عند فتح الصفحة
        window.onload = searchJobs;
    </script>
</body>
</html>
