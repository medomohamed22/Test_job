<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك بحث الوظائف</title>
    <!-- استدعاء مكتبة Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- استدعاء خط كايرو لدعم اللغة العربية بشكل جميل -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f3f4f6;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- قسم الهيدر وشريط البحث -->
    <header class="bg-blue-700 text-white shadow-md py-12 mb-8">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl font-bold mb-4">ابحث عن وظيفة أحلامك</h1>
            <p class="mb-8 text-blue-200 text-lg">محرك بحث سريع للوظائف باستخدام Google Jobs API</p>
            
            <div class="flex justify-center max-w-2xl mx-auto shadow-lg rounded-lg overflow-hidden">
                <input type="text" id="searchInput" placeholder="ابحث عن وظيفة.. مثال: Frontend Developer, Barista" 
                    class="w-full p-4 text-gray-800 focus:outline-none text-lg"
                    onkeypress="handleKeyPress(event)">
                <button onclick="searchJobs()" 
                    class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 px-8 py-4 font-bold text-lg transition duration-300 w-32">
                    ابحث
                </button>
            </div>
        </div>
    </header>

    <!-- قسم عرض النتائج -->
    <main class="container mx-auto px-4 pb-12">
        <!-- مؤشر التحميل -->
        <div id="loading" class="text-center text-xl text-blue-600 font-bold hidden my-10">
            <svg class="animate-spin h-10 w-10 mx-auto mb-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            جاري البحث عن الوظائف...
        </div>
        
        <!-- شبكة الوظائف -->
        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- سيتم إضافة بطاقات الوظائف هنا عبر الجافاسكربت -->
        </div>
    </main>

    <!-- الجافاسكربت (منطق جلب البيانات) -->
    <script>
        // مفتاح الـ API الخاص بك
        const API_KEY = '15381654fdf0e35a2423170aa385065b37f2b9bcdb523273be4ddb65a7404d6e';

        // دالة للبحث عند الضغط على زر Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchJobs();
            }
        }

        async function searchJobs() {
            const searchInput = document.getElementById('searchInput').value;
            const query = searchInput.trim() !== '' ? searchInput : 'Barista'; // وظيفة افتراضية إذا كان المربع فارغاً
            const resultsContainer = document.getElementById('results');
            const loadingIndicator = document.getElementById('loading');

            // تفريغ النتائج السابقة وإظهار التحميل
            resultsContainer.innerHTML = '';
            loadingIndicator.classList.remove('hidden');

            try {
                // رابط SerpApi الأصلي
                const targetUrl = encodeURIComponent(`https://serpapi.com/search.json?engine=google_jobs&q=${query}&api_key=${API_KEY}&hl=en`);
                
                // استخدام AllOrigins كـ Proxy لتخطي حظر الـ CORS في المتصفح
                const proxyUrl = `https://api.allorigins.win/raw?url=${targetUrl}`;

                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // إخفاء التحميل
                loadingIndicator.classList.add('hidden');

                const jobs = data.jobs_results || [];

                if (jobs.length > 0) {
                    jobs.forEach(job => {
                        // استخراج البيانات الفرعية (إن وُجدت)
                        const scheduleType = job.detected_extensions?.schedule_type || 'غير محدد';
                        const salary = job.detected_extensions?.salary || 'غير معلن';
                        const postedAt = job.detected_extensions?.posted_at || '';

                        // إنشاء بطاقة الوظيفة
                        const jobCard = `
                            <div class="bg-white rounded-xl shadow hover:shadow-2xl transition duration-300 flex flex-col overflow-hidden border border-gray-200">
                                <div class="p-6 flex-grow">
                                    <h2 class="text-xl font-bold text-gray-900 mb-2" dir="ltr">${job.title}</h2>
                                    <div class="text-blue-600 font-semibold mb-1" dir="ltr">🏢 ${job.company_name}</div>
                                    <div class="text-gray-500 text-sm mb-4" dir="ltr">📍 ${job.location} ${postedAt ? '• ⏱️ ' + postedAt : ''}</div>
                                    
                                    <div class="flex flex-wrap gap-2 mb-4" dir="ltr">
                                        <span class="bg-blue-50 text-blue-700 text-xs px-3 py-1 rounded-full border border-blue-200">${scheduleType}</span>
                                        <span class="bg-green-50 text-green-700 text-xs px-3 py-1 rounded-full border border-green-200">💵 ${salary}</span>
                                    </div>
                                    
                                    <p class="text-gray-600 text-sm line-clamp-3 leading-relaxed" dir="ltr">
                                        ${job.description}
                                    </p>
                                </div>
                                <div class="p-4 bg-gray-50 border-t border-gray-100">
                                    <a href="${job.share_link}" target="_blank" 
                                        class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200">
                                        التقديم للوظيفة
                                    </a>
                                </div>
                            </div>
                        `;
                        resultsContainer.innerHTML += jobCard;
                    });
                } else {
                    resultsContainer.innerHTML = '<div class="col-span-full text-center text-gray-500 text-xl py-10">لم يتم العثور على وظائف مطابقة لبحثك. جرب كلمات أخرى.</div>';
                }
            } catch (error) {
                console.error("Error:", error);
                loadingIndicator.classList.add('hidden');
                resultsContainer.innerHTML = '<div class="col-span-full text-center text-red-500 text-xl py-10">حدث خطأ أثناء جلب البيانات. يرجى المحاولة لاحقاً.</div>';
            }
        }

        // تشغيل بحث افتراضي فور فتح الصفحة
        window.onload = searchJobs;
    </script>
</body>
</html>
