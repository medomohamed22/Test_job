<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول بواسطة Pi (أي متصفح)</title>
    
    <!-- تنسيقات التصميم CSS -->
    <style>
        :root {
            --pi-purple: #5b2a86;
            --pi-gold: #f3a830;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            margin-top: 0;
            color: var(--pi-purple);
            font-size: 24px;
            margin-bottom: 10px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.6;
        }

        .pi-btn {
            background-color: var(--pi-purple);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            width: 100%;
            font-weight: bold;
        }

        .pi-btn:hover {
            background-color: #48206b;
        }

        .pi-btn:active {
            transform: scale(0.98);
        }

        #loading, #success-section, #error-message {
            display: none;
        }

        #loading {
            color: var(--pi-gold);
            font-weight: bold;
            margin-top: 20px;
        }

        #success-section {
            margin-top: 25px;
            padding: 20px;
            background-color: #f0fdf4;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        #error-message {
            margin-top: 15px;
            color: #dc2626;
            background-color: #fef2f2;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>أهلاً بك في موقعنا</h2>
    <p>بفضل خاصية Pi Sign-in الجديدة، يمكنك الآن تسجيل الدخول بأمان من أي متصفح ويب.</p>
    
    <!-- الزر الذي يبدأ عملية تسجيل الدخول -->
    <button id="pi-login-btn" class="pi-btn" onclick="startPiLogin()">
        تسجيل الدخول بواسطة Pi
    </button>

    <!-- شاشة التحميل -->
    <div id="loading">جاري جلب بياناتك...</div>

    <!-- رسالة الخطأ -->
    <div id="error-message">حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مجدداً.</div>

    <!-- رسالة النجاح -->
    <div id="success-section">
        <h3>تم تسجيل الدخول بنجاح! 🎉</h3>
        <p>مرحباً بك، <strong id="username-display" style="color: var(--pi-purple);"></strong></p>
    </div>
</div>

<!-- كود JavaScript الخاص بالاتصال بمنصة Pi -->
<script>
    // ⚠️ هااااام جداً: ضع Client ID الخاص بتطبيقك من بوابة مطوري Pi
    const CLIENT_ID = 'DE9gV41Op9HQV9I8kLDKibDLTJp41g6wmHqesVMpylc'; 
    
    // يقوم بجلب رابط صفحتك الحالي لكي يعود إليه النظام بعد تسجيل الدخول
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    // دالة لتوليد رمز عشوائي للحماية (Security State)
    function generateState() {
        return Math.random().toString(36).substring(2, 15);
    }

    // 1. الدالة التي تعمل عند النقر على زر تسجيل الدخول
    function startPiLogin() {
        if(CLIENT_ID === 'DE9gV41Op9HQV9I8kLDKibDLTJp41g6wmHqesVMpylc') {
            alert('يرجى وضع معرف العميل (Client ID) الخاص بك في الكود أولاً!');
            return;
        }

        // إنشاء وتخزين رمز أمان للتحقق منه لاحقاً
        const state = generateState();
        sessionStorage.setItem('pi_auth_state', state);

        // إنشاء رابط التوجيه إلى سيرفرات Pi (حسب المستندات الرسمية)
        const authUrl = new URL('https://accounts.pinet.com/oauth/authorize');
        authUrl.searchParams.append('response_type', 'token');
        authUrl.searchParams.append('client_id', CLIENT_ID);
        authUrl.searchParams.append('redirect_uri', REDIRECT_URI);
        authUrl.searchParams.append('scope', 'username');
        authUrl.searchParams.append('state', state);

        // توجيه المستخدم لصفحة Pi لتسجيل الدخول أو مسح الـ QR Code
        window.location.href = authUrl.toString();
    }

    // 2. الدالة التي تعمل تلقائياً للتحقق مما إذا كان المستخدم عائداً للتو من تسجيل الدخول
    async function checkLoginRedirect() {
        // فحص الرابط بحثاً عن بيانات المرور (Access Token) التي يرسلها Pi
        const hash = window.location.hash.substring(1);
        if (!hash) return;

        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const state = params.get('state');

        if (accessToken) {
            // التحقق من الأمان لمعرفة ما إذا كان الطلب شرعياً
            const savedState = sessionStorage.getItem('pi_auth_state');
            if (state !== savedState) {
                console.error('حالة غير متطابقة (State mismatch) - قد يكون هناك تلاعب.');
                return;
            }

            // تنظيف الرابط لإخفاء الـ Access Token لأسباب أمنية ولجمالية الرابط
            window.history.replaceState(null, null, window.location.pathname);

            // تعديل واجهة المستخدم
            document.getElementById('pi-login-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                // استخدام الرمز (Access Token) لجلب بيانات اسم المستخدم من Pi API
                const response = await fetch('https://api.minepi.com/v2/me', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error('فشل في جلب البيانات من Pi Server');
                }

                // استخراج البيانات
                const data = await response.json();
                
                // إخفاء التحميل وعرض اسم المستخدم بنجاح
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success-section').style.display = 'block';
                document.getElementById('username-display').textContent = "@" + data.username;

            } catch (error) {
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('pi-login-btn').style.display = 'block';
                document.getElementById('error-message').style.display = 'block';
            }
        }
    }

    // بمجرد تحميل الصفحة بالكامل، يتم تشغيل الفحص
    window.onload = checkLoginRedirect;
</script>

</body>
</html>
