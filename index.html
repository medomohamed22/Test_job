<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Pro Assistant</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    
    <!-- غطاء للشاشة في الهواتف عند فتح القائمة -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside class="sidebar hidden-mobile" id="sidebar">
        <div class="sidebar-header">
            <button id="new-chat-btn"><i class="fas fa-plus"></i> محادثة جديدة</button>
            <button id="close-sidebar-mobile" class="mobile-only-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="history-list" id="history-list"></div>
        <div class="sidebar-footer">
            <button id="export-pdf-btn"><i class="fas fa-file-pdf"></i> تصدير PDF</button>
        </div>
    </aside>

    <div class="main-content">
        <header class="chat-header">
            <div class="header-right">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="ai-icon-container"><i class="fas fa-microchip"></i></div>
                <h2 class="hide-on-mobile">المساعد <span>Pro</span></h2>
            </div>
            <div class="header-left">
                <select id="persona-select" class="persona-dropdown">
                    <option value="helpful">مساعد عام</option>
                    <option value="programmer">مبرمج</option>
                    <option value="teacher">معلم</option>
                </select>
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="suggestions-container" id="suggestions">
                <h3>كيف يمكنني مساعدتك؟</h3>
                <div class="suggestions-grid">
                    <button class="sugg-btn">اكتب كود HTML لآلة حاسبة</button>
                    <button class="sugg-btn">اشرح الفرق بين React و Vue</button>
                    <button class="sugg-btn">ترجم هذه العبارة للإنجليزية</button>
                    <button class="sugg-btn">لخص أهمية الذكاء الاصطناعي</button>
                </div>
            </div>
        </main>

        <div id="image-preview-container" style="display: none;">
            <img id="image-preview" src="" alt="preview">
            <button id="remove-image"><i class="fas fa-times"></i></button>
        </div>

        <div class="input-container">
            <div class="input-box">
                <input type="file" id="file-upload" accept="image/*" hidden>
                <label for="file-upload" class="action-btn"><i class="fas fa-image"></i></label>
                
                <textarea id="user-input" placeholder="اكتب رسالتك..." rows="1"></textarea>
                
                <button id="mic-btn" class="action-btn"><i class="fas fa-microphone"></i></button>
                <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                <button id="stop-btn" class="stop-btn" style="display: none;"><i class="fas fa-stop-circle"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
