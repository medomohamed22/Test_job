<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - Pi Network</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <!-- إضافة مكتبة Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <div class="pi-logo-container">
                <i class="fab fa-product-hunt"></i>
            </div>
            <h2>مرحباً بك في المساعد الذكي</h2>
            <p>يجب تسجيل الدخول باستخدام حساب Pi الخاص بك للبدء.</p>
            <button id="pi-login-btn" class="pi-btn">
                <i class="fab fa-product-hunt"></i> تسجيل الدخول بواسطة Pi
            </button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- الحاوية الرئيسية للشات (مخفية افتراضياً) -->
    <div id="main-chat-container" class="chat-container" style="display: none;">
        <!-- الرأس -->
        <header class="chat-header">
            <div class="header-left">
                <div class="ai-icon-container">
                    <i class="fas fa-microchip"></i>
                </div>
                <h2>المساعد <span>Pro</span></h2>
            </div>
            
            <div class="header-right">
                <!-- عرض اسم المستخدم بعد تسجيل الدخول -->
                <span id="username-display" class="pi-username"></span>
                
                <!-- تخصيص الشخصية -->
                <select id="persona-select" title="اختر شخصية المساعد">
                    <option value="مساعد ذكي عام، تجيب بوضوح واختصار.">🤖 مساعد عام</option>
                    <option value="أنت مبرمج خبير ومهندس برمجيات، تشرح الأكواد بالتفصيل.">💻 مبرمج خبير</option>
                    <option value="أنت كاتب محتوى مبدع، تكتب مقالات جذابة بأسلوب تسويقي.">✍️ كاتب محتوى</option>
                </select>
                <!-- الأزرار -->
                <button id="export-btn" title="تصدير المحادثة"><i class="fas fa-download"></i></button>
                <button id="theme-toggle" title="الوضع الليلي/النهاري"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <!-- منطقة الرسائل -->
        <main class="chat-box" id="chat-box">
            <!-- اقتراحات ذكية تظهر في البداية -->
            <div class="suggestions-container" id="suggestions">
                <h3>كيف يمكنني مساعدتك اليوم؟ ✨</h3>
                <div class="suggestions-grid">
                    <button class="suggestion-btn" onclick="sendSuggestion('اكتب لي كود HTML و CSS لآلة حاسبة')">🧮 كود لآلة حاسبة</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('اشرح لي مشروع Pi Network باختصار')">🟣 اشرح Pi Network</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('كيف أتعلم لغة بايثون من الصفر؟')">🐍 تعلم بايثون</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('اكتب لي قصة قصيرة ملهمة عن النجاح')">📖 قصة قصيرة</button>
                </div>
            </div>
        </main>

        <!-- منطقة الإدخال -->
        <div class="input-container">
            <div class="input-box">
                <textarea id="user-input" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <!-- زر إيقاف التوليد -->
                <button id="stop-btn" title="إيقاف التوليد" style="display: none;"><i class="fas fa-stop"></i></button>
                <button id="send-btn" title="إرسال"><i class="fas fa-paper-plane"></i></button>
            </div>
            <p class="disclaimer">يعمل بواسطة Google AI | متصل بشبكة Pi Network</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
