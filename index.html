<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Nexus Wallet</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    :root {
      --primary: #6c5ce7;
      --dark-bg: #0f172a;
      --glass: rgba(255, 255, 255, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: all 0.3s ease;
    }

    body {
      background: var(--dark-bg);
      color: white;
      font-family: 'Inter', 'Tajawal', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    #login-overlay {
      position: fixed;
      inset: 0;
      background: var(--dark-bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .floating-pi {
      width: 100px;
      height: 100px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 0 30px var(--primary);
      animation: float 4s ease-in-out infinite;
      margin-bottom: 30px;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(10deg);
      }
    }

    .lang-switch {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 10px 15px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 10000;
      font-size: 1.2rem;
    }

    .vault-card {
      background: linear-gradient(135deg, var(--primary), #a29bfe);
      border-radius: 24px;
      padding: 30px;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      margin-top: 50px;
    }

    .balance-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 5px;
    }

    .balance-value {
      font-size: 2.8rem;
      font-weight: 700;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin: 30px 0;
    }

    .action-btn {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      justify-content: center;
      align-items: flex-end;
    }

    .modal-content {
      background: #1e293b;
      width: 100%;
      border-radius: 30px 30px 0 0;
      padding: 40px 25px;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 15px;
      border-radius: 15px;
      color: white;
      margin-bottom: 15px;
      text-align: center;
      font-size: 1.1rem;
    }

    .confirm-btn {
      width: 100%;
      padding: 16px;
      border-radius: 15px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .confirm-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .history-section {
      background: var(--glass);
      border-radius: 25px;
      padding: 20px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.95rem;
    }

    .txid {
      opacity: 0.6;
      font-size: 0.75rem;
      word-break: break-all;
      margin-top: 5px;
    }

    [dir="rtl"] .lang-switch {
      right: auto;
      left: 20px;
    }
  </style>
</head>

<body dir="ltr">

  <button class="lang-switch" onclick="toggleLang()">🌐</button>

  <div id="login-overlay">
    <div class="floating-pi">π</div>
    <h1 id="t-welcome">Nexus Wallet</h1>
    <p id="t-subwelcome" style="opacity: 0.6; margin: 15px 0 30px;">Withdraw your Pi reward</p>
    <button onclick="login()" class="confirm-btn" style="width: 200px;" id="t-login-btn">Secure Login</button>
  </div>

  <div class="vault-card">
    <div class="balance-label" id="t-balance-label">Available Balance</div>
    <div class="balance-value">
      <span id="main-balance">1.00</span>
      <span style="font-size: 1.2rem;">π</span>
    </div>
    <div id="user-display" style="margin-top: 15px; opacity: 0.7; font-size: 0.9rem;"></div>
  </div>

  <div class="action-grid">
    <div class="action-btn" onclick="openModal('withdraw')">
      <span id="t-withdraw-btn">📤 Withdraw Pi</span>
    </div>
  </div>

  <div class="history-section">
    <h4 id="t-history-title" style="margin-bottom: 15px; opacity: 0.7;">Recent Activity</h4>
    <div id="history-list"></div>
  </div>

  <div id="withdraw-modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2 id="t-wit-title" style="margin-bottom: 20px; text-align: center;">Withdraw Pi</h2>
      <input type="text" id="wit-address" placeholder="Wallet Address G...">
      <input type="number" id="wit-amount" placeholder="Amount" value="1" min="0.0000001" max="1" step="0.0000001">
      <button id="btn-wit" class="confirm-btn" style="background: #ef4444;" onclick="executeWithdraw()">Confirm Withdrawal</button>
    </div>
  </div>

  <script>
    let user = null;
    let currentLang = 'en';
    const INITIAL_BALANCE = 1;

    const i18n = {
      en: {
        welcome: "Nexus Wallet",
        sub: "Withdraw your Pi reward",
        login: "Secure Login",
        bal_lbl: "Available Balance",
        wit: "📤 Withdraw Pi",
        hist: "Recent Activity",
        wit_t: "Withdraw Pi",
        conf_wit: "Confirm Withdrawal",
        success_wit: "Withdrawal Successful!",
        wait: "Processing...",
        low_bal: "Insufficient balance",
        already: "You already withdrew your available balance on this device",
        no_history: "No activity yet"
      },
      ar: {
        welcome: "محفظة نيكسوس",
        sub: "اسحب مكافأة الباي الخاصة بك",
        login: "دخول آمن",
        bal_lbl: "الرصيد المتاح",
        wit: "📤 سحب باي",
        hist: "العمليات الأخيرة",
        wit_t: "سحب باي",
        conf_wit: "تأكيد السحب",
        success_wit: "تم السحب بنجاح!",
        wait: "جاري المعالجة...",
        low_bal: "الرصيد غير كافٍ",
        already: "لقد قمت بسحب الرصيد المتاح على هذا الجهاز",
        no_history: "لا توجد عمليات بعد"
      }
    };

    function getStorageKey() {
      return user ? `nexus_withdraw_only_${user.uid}` : 'nexus_withdraw_only_guest';
    }

    function getLocalData() {
      const saved = localStorage.getItem(getStorageKey());

      if (!saved) {
        return {
          withdrawals: []
        };
      }

      try {
        const parsed = JSON.parse(saved);
        return {
          withdrawals: Array.isArray(parsed.withdrawals) ? parsed.withdrawals : []
        };
      } catch {
        return {
          withdrawals: []
        };
      }
    }

    function saveLocalData(data) {
      localStorage.setItem(getStorageKey(), JSON.stringify(data));
    }

    function getBalance() {
      const data = getLocalData();

      const totalWithdrawn = data.withdrawals.reduce((sum, item) => {
        return sum + parseFloat(item.amount || 0);
      }, 0);

      const balance = INITIAL_BALANCE - totalWithdrawn;
      return Math.max(balance, 0);
    }

    function toggleLang() {
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

      const t = i18n[currentLang];

      document.getElementById('t-welcome').innerText = t.welcome;
      document.getElementById('t-subwelcome').innerText = t.sub;
      document.getElementById('t-login-btn').innerText = t.login;
      document.getElementById('t-balance-label').innerText = t.bal_lbl;
      document.getElementById('t-withdraw-btn').innerText = t.wit;
      document.getElementById('t-history-title').innerText = t.hist;
      document.getElementById('t-wit-title').innerText = t.wit_t;
      document.getElementById('btn-wit').innerText = t.conf_wit;

      refreshData();
    }

    async function login() {
      try {
        if (!window.Pi) {
          alert("Please open this app inside Pi Browser");
          return;
        }

        const auth = await window.Pi.authenticate(['username'], onIncomplete);
        user = auth.user;

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('user-display').innerText = `@${user.username}`;

        refreshData();
      } catch (e) {
        console.error(e);
        alert("Use Pi Browser");
      }
    }

    function refreshData() {
      if (!user) return;

      const balance = getBalance();
      document.getElementById('main-balance').innerText = balance.toFixed(2);

      const data = getLocalData();
      const list = document.getElementById('history-list');

      if (!data.withdrawals.length) {
        list.innerHTML = `<div style="opacity:0.6;">${i18n[currentLang].no_history}</div>`;
        return;
      }

      const all = data.withdrawals
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .slice(0, 5);

      list.innerHTML = all.map(i => `
        <div class="history-item">
          <div>
            <div>${i18n[currentLang].wit}</div>
            <div class="txid">${i.txid ? i.txid : 'Pending'}</div>
          </div>
          <span style="color:#ff7675">-${parseFloat(i.amount || 0).toFixed(2)}π</span>
        </div>
      `).join('');
    }

    async function executeWithdraw() {
      const addr = document.getElementById('wit-address').value.trim();
      const amt = parseFloat(document.getElementById('wit-amount').value);
      const bal = getBalance();

      if (!user) return alert("Login first");

      if (!addr || !addr.startsWith('G') || addr.length < 50) {
        return alert("Invalid wallet address");
      }

      if (!amt || amt <= 0) {
        return alert("Invalid amount");
      }

      if (amt > bal) {
        return alert(i18n[currentLang].low_bal);
      }

      if (bal <= 0) {
        return alert(i18n[currentLang].already);
      }

      const btn = document.getElementById('btn-wit');
      btn.disabled = true;
      btn.innerText = i18n[currentLang].wait;

      try {
        const res = await fetch('/api/withdraw', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            uid: user.uid,
            username: user.username,
            amount: amt,
            walletAddress: addr
          })
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.error || result.details || "Withdrawal failed");
        }

        const data = getLocalData();

        data.withdrawals.push({
          pi_user_id: user.uid,
          username: user.username,
          amount: amt,
          wallet_address: addr,
          txid: result.txid,
          created_at: new Date().toISOString()
        });

        saveLocalData(data);

        alert(i18n[currentLang].success_wit);

        closeAllModals();
        document.getElementById('wit-address').value = '';
        document.getElementById('wit-amount').value = '1';

        refreshData();
      } catch (e) {
        console.error(e);
        alert(e.message || "Server Error");
      }

      btn.disabled = false;
      btn.innerText = i18n[currentLang].conf_wit;
    }

    function openModal(type) {
      document.getElementById(`${type}-modal`).style.display = 'flex';
    }

    function closeModal(e) {
      if (e.target.classList.contains('modal')) {
        e.target.style.display = 'none';
      }
    }

    function closeAllModals() {
      document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    async function onIncomplete(payment) {
      console.log("Incomplete payment:", payment);
    }

    window.onload = function() {
      if (window.Pi) {
        window.Pi.init({
          version: "2.0",
          sandbox: false
        });
      }
    };
  </script>
</body>
</html>
