<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- تعديل الـ Viewport لحل مشكلة الهواتف -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Pro + Pi Network</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    
    <!-- مكتبة الدفع وتسجيل الدخول الخاصة بـ Pi Network -->
    <script src="https://sdk.pi.network/pi.js"></script>
</head>
<body>
    
    <!-- شاشة تسجيل الدخول بـ Pi -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="pi-logo"><i class="fab fa-pi"></i></div>
            <h2>مرحباً بك في الذكاء الاصطناعي</h2>
            <p>قم بتسجيل الدخول بحساب Pi الخاص بك للحصول على 5 توكينات مجانية!</p>
            <button id="pi-login-btn"><i class="fab fa-pi"></i> تسجيل الدخول بـ Pi</button>
        </div>
    </div>

    <!-- نافذة شراء التوكينات -->
    <div id="buy-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>انتهت التوكينات ⚠️</h3>
            <p>لقد استهلكت رصيدك المجاني. اشترِ 50 توكن للردود باستخدام عملة Pi.</p>
            <div id="price-loader">جاري حساب السعر المباشر من OKX... <i class="fas fa-spinner fa-spin"></i></div>
            <h4 id="live-pi-price" style="display: none; color: #8a2be2; margin: 15px 0;">السعر: 0.00 Pi</h4>
            <button id="buy-tokens-btn" style="display: none;"><i class="fas fa-shopping-cart"></i> شراء 50 توكن</button>
            <button id="close-buy-modal" class="secondary-btn">إغلاق</button>
        </div>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <aside class="sidebar hidden-mobile" id="sidebar">
        <!-- ... نفس كود الشريط الجانبي السابق ... -->
        <div class="sidebar-header">
            <button id="new-chat-btn"><i class="fas fa-plus"></i> محادثة جديدة</button>
            <button id="close-sidebar-mobile" class="mobile-only-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="history-list" id="history-list"></div>
    </aside>

    <div class="main-content">
        <header class="chat-header">
            <div class="header-right">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <h2>المساعد <span>Pro</span></h2>
            </div>
            <div class="header-left">
                <!-- عداد التوكينات واسم المستخدم -->
                <div class="user-info">
                    <span id="username-display"></span>
                    <div class="token-badge" id="token-badge">🪙 <span id="token-count">0</span></div>
                </div>
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <main class="chat-box" id="chat-box"></main>

        <!-- منطقة الإدخال -->
        <div class="input-container">
            <div class="input-box">
                <textarea id="user-input" placeholder="اكتب رسالتك..." rows="1"></textarea>
                <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
